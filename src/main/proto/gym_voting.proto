syntax = "proto3";
package com.gym.system.proto;

option java_package = "com.gym.system.proto";
option java_outer_classname = "GymProto";

message Modality {
  int32 id = 1;
  string name = 2;
}

message LoginRequest { string username = 1; string password = 2; }
message LoginResponse { bool success = 1; string session_token = 2; string message = 3; }

message ModalityListResponse { repeated Modality modalities = 1; int64 deadline = 2; }

message VoteRequest { string session_token = 1; int32 modality_id = 2; }
message VoteResponse { bool success = 1; string message = 2; }

message AdminNotice { string sender = 1; int64 timestamp = 2; string content = 3; }

message VoteResult { int32 modality_id = 1; string name = 2; int32 total_votes = 3; double percentage = 4; }
message ResultsResponse { repeated VoteResult results = 1; string winner = 2; }